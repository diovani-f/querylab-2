[phases.setup]
nixPkgs = ["nodejs_18", "python3", "gcc", "gnumake", "pkg-config", "glibc", "stdenv"]

[phases.install]
cmds = [
  "cd backend",
  "export CC=gcc",
  "export CXX=g++",
  "npm ci --verbose"
]

[phases.build]
cmds = [
  "cd backend",
  "npm run build"
]

[start]
cmd = "cd backend && npm start"
